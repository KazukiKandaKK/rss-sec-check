name: Fetch RSS feeds

on:
  schedule:
    # 毎時実行（privateリポジトリでもActions無料枠に収まる頻度）
    - cron: "23 * * * *"
  workflow_dispatch:

concurrency:
  group: fetch-feeds
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm --prefix functions run build

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/service-account.json"

      - name: Fetch feeds into Firestore
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json
        run: npm --prefix scripts run fetch
