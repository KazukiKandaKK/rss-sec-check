name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Create .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE" ]; then
            echo "::error:: secrets.ENV_FILE is not set. Add the contents of your .env file (VITE_* and OWNER_EMAIL lines) as a repository secret named ENV_FILE."
            exit 1
          fi
          printf '%s\n' "$ENV_FILE" > .env
          # 本番ビルドではエミュレータ接続を無効化する
          sed -i '/^VITE_USE_EMULATOR=/d' .env

      - run: npm ci

      - run: npm --prefix functions run build

      - run: npm --prefix web run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: rss-sec-check
